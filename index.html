<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Periodic Table</title>
    <style>
        body {
            font-family: Agency FB;
            background: #181c24;
            color: #e0e0e0;
            text-align: center;
            font-weight: 600;
            font-size: large;
            padding: 25px;
            transition: background 0.4s, color 0.4s;
        }

        .dark-toggle {
            position: fixed;
            top: 18px;
            right: 28px;
            background: #23283a;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 1em;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
            transition: background 0.3s, color 0.3s;
            z-index: 2000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(30, 34, 44, 0.92);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            padding: 32px 24px;
        }

        h1 {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 18px;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 2px 12px #23283a;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 60px);
            gap: 4px;
            justify-content: center;
            margin: 24px auto;
        }

        .element {
            width: 60px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            transition: transform .18s, box-shadow .18s;
            position: relative;
            border-radius: 4px;
        }

        .element .number {
            position: absolute;
            top: 4px;
            left: 4px;
            font-size: 11px;
            opacity: 0.9;
        }

        .element .symbol {
            font-size: 18px;
            margin-top: 4px;
            font-weight: bold;
        }

        .element .name {
            font-size: 8px;
            margin-top: 2px;
            opacity: 0.9;
        }

        .element:hover {
            transform: scale(1.13) rotate(-2deg);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.25);
            filter: brightness(1.12) saturate(1.2);
            z-index: 2;
        }

        /* Category colors */
        .alkali {
            background: #ff9800;
            color: #23283a;
        }

        .alkaline {
            background: #FFE082;
            color: #23283a;
        }

        .transition {
            background: #9c27b0;
        }

        .postmetal {
            background: #68d137;
            color: #23283a;
        }

        .metalloid {
            background: #48d87f;
            color: #23283a;
        }

        .halogen {
            background: #00bfa5;
            color: #23283a;
        }

        .noble {
            background: #2196f3;
            color: #23283a;
        }

        .lanthanoid {
            background: #e91e63;
        }

        .actinoid {
            background: #f06292;
        }

        .non-metals {
            background: #5c6bc0;
        }

        .info-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 34, 44, 0.98);
            border-radius: 18px;
            border: 2px solid #23283a;
            padding: 28px 22px;
            width: 320px;
            box-shadow: 0 0 32px rgba(0, 0, 0, 0.38);
            z-index: 1000;
            color: #fff;
            font-size: 1.08em;
            animation: popIn 0.5s cubic-bezier(.25, 1.5, .5, 1.1);
        }

        .info-panel h2 {
            margin: 0 0 20px 0;
            color: #ffd54f;
        }

        .element-basics {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .element-details {
            opacity: 0.9;
        }

        .info-panel p {
            margin: 8px 0;
        }

        .info-panel strong {
            color: #90caf9;
            margin-right: 8px;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.7) translate(-50%, -30%);
                opacity: 0;
            }

            80% {
                transform: scale(1.05) translate(-50%, -52%);
                opacity: 1;
            }

            100% {
                transform: scale(1) translate(-50%, -50%);
                opacity: 1;
            }
        }

        .info-panel.hidden {
            display: none;
        }

        .legend {
            margin: 0 auto 18px auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 18px;
            background: rgba(30, 34, 44, 0.92);
            border-radius: 12px;
            padding: 14px 18px 10px 18px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 1.08em;
            font-weight: bold;
            color: #e0e0e0;
            margin-bottom: 0;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
            user-select: none;
        }

        .legend-item.active {
            background: #23283a;
            color: #ffd54f;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.22);
        }

        .legend-color {
            width: 22px;
            height: 22px;
            margin-right: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                padding: 12px 2px;
            }

            .periodic-table {
                grid-template-columns: repeat(18, 45px);
                gap: 5px;
            }

            .element {
                min-height: 45px;
                font-size: 0.85em;
            }

            .info-panel {
                width: 95vw;
                max-width: 340px;
            }

            .legend {
                padding: 10px;
                gap: 12px;
            }

            .legend-item {
                font-size: 0.95em;
                padding: 4px 10px;
            }

            .legend-color {
                width: 18px;
                height: 18px;
                margin-right: 8px;
            }
        }

        @media (max-width: 800px) {
            .container {
                padding: 2px 0;
            }

            .periodic-table {
                grid-template-columns: repeat(18, 35px);
                gap: 3px;
            }

            .element {
                font-size: 0.75em;
                padding: 6px 0 3px 0;
            }

            .info-panel {
                width: 98vw;
                max-width: 98vw;
            }

            .legend {
                padding: 8px;
                gap: 8px;
                flex-direction: column;
                align-items: flex-start;
                max-height: 200px;
                flex-wrap: wrap;
                overflow-x: auto;
            }

            .legend-item {
                font-size: 0.85em;
                padding: 3px 8px;
                margin: 2px 0;
            }

            .legend-color {
                width: 16px;
                height: 16px;
                margin-right: 6px;
            }
        }

        /* Dark mode toggle */
        body.light {
            background: #f4f4f4;
            color: #23283a;
        }

        body.light .container {
            background: #fff;
            color: #23283a;
        }

        body.light h1 {
            color: #23283a;
            text-shadow: none;
        }

        body.light .element {
            color: #23283a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
        }

        body.light .info-panel {
            background: #fff;
            color: #23283a;
            border: 2px solid #888;
        }

        body.light .legend {
            background: #fff;
            color: #23283a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
        }

        body.light .legend-item {
            color: #23283a;
        }
    </style>
</head>

        // Helper function to get element's state at room temperature
        function getElementState(number) {
            const gases = [1, 2, 7, 8, 9, 10, 17, 18, 36, 54, 86, 118];
            const liquids = [35, 80];
            if (gases.includes(number)) return "Gas";
            if (liquids.includes(number)) return "Liquid";
            return "Solid";
        }

        // Helper function to get element's block
        function getElementBlock(column, row) {
            if (row >= 8) return "f-block";
            if ([1, 2].includes(column)) return "s-block";
            if (column >= 13) return "p-block";
            return "d-block";
        }

        // Helper function to get group names
        function getGroupName(column) {
            const groupMap = {
                1: '1 (IA)',
                2: '2 (IIA)',
                3: '3 (IIIB)',
                4: '4 (IVB)',
                5: '5 (VB)',
                6: '6 (VIB)',
                7: '7 (VIIB)',
                8: '8 (VIIIB)',
                9: '9 (VIIIB)',
                10: '10 (VIIIB)',
                11: '11 (IB)',
                12: '12 (IIB)',
                13: '13 (IIIA)',
                14: '14 (IVA)',
                15: '15 (VA)',
                16: '16 (VIA)',
                17: '17 (VIIA)',
                18: '18 (VIIIA)'
            };
            return groupMap[column] || 'N/A';
        }

        const table = document.getElementById('ptable');
        table.style.gridTemplateRows = 'repeat(10, auto)';
        data.forEach(([no, sym, name, mass, cls, col, row]) => {
            const el = document.createElement('div');
            el.className = 'element ' + cls;
            el.style.gridColumn = col;
            el.style.gridRow = row;
            const numberSpan = document.createElement('span');
            numberSpan.className = 'number';
            numberSpan.textContent = no;
            
            const symbolSpan = document.createElement('span');
            symbolSpan.className = 'symbol';
            symbolSpan.textContent = sym;
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'name';
            nameSpan.textContent = name;
            
            el.appendChild(numberSpan);
            el.appendChild(symbolSpan);
            el.appendChild(nameSpan);
            el.dataset.symbol = sym;
            el.dataset.name = name;
            el.dataset.number = no;
            el.dataset.mass = mass;
            el.addEventListener('click', () => {
                // Basic info
                document.getElementById('info-name').textContent = name;
                document.getElementById('info-symbol').textContent = sym;
                document.getElementById('info-number').textContent = no;
                document.getElementById('info-mass').textContent = mass;
                
                // Additional details
                document.getElementById('info-category').textContent = cls.charAt(0).toUpperCase() + cls.slice(1);
                document.getElementById('info-state').textContent = getElementState(parseInt(no));
                document.getElementById('info-block').textContent = getElementBlock(col, row);
                document.getElementById('info-period').textContent = row <= 7 ? row : (row === 8 ? '6 (Lanthanide Series)' : '7 (Actinide Series)');
                document.getElementById('info-group').textContent = getGroupName(col);
                
                document.getElementById('info').classList.remove('hidden');
            });
            table.appendChild(el);
        });

        // Add click event listener to close info panel when clicking outside
        document.addEventListener('click', (e) => {
            const infoPanel = document.getElementById('info');
            if (!infoPanel.classList.contains('hidden')) {
                // Check if click is outside the info panel
                if (!e.target.closest('.info-panel') && !e.target.closest('.element')) {
                    infoPanel.classList.add('hidden');
                }
            }
        });

        // Legend interaction functionality
        const legendItems = document.querySelectorAll('.legend-item');
        const elements = document.querySelectorAll('.element');

        legendItems.forEach(item => {
            item.addEventListener('click', () => {
                const group = item.dataset.group;
                
                // Toggle active state of legend item
                legendItems.forEach(li => li.classList.remove('active'));
                item.classList.toggle('active');

                // Reset all elements
                elements.forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'none';
                });

                // If this group was already active, we're just resetting
                if (!item.classList.contains('active')) return;

                // Highlight matching elements and dim others
                elements.forEach(el => {
                    if (!el.classList.contains(group)) {
                        el.style.opacity = '0.2';
                    } else {
                        el.style.transform = 'scale(1.1)';
                    }
                });
            });
        });

        // Add click handler to table to reset highlights when clicking outside elements
        document.querySelector('.periodic-table').addEventListener('click', (e) => {
            if (e.target.classList.contains('periodic-table')) {
                legendItems.forEach(item => item.classList.remove('active'));
                elements.forEach(el => {
                    el.style.opacity = '1';
                    el.style.transform = 'none';
                });
            }
        });
    </script>
</body>

</html>
